<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - AR Dashboard Industriale</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720; debugUIEnabled: false; trackingMethod: best;">
      
      <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="5">
        
        <a-entity rotation="-90 0 0">
          
          <a-plane position="0 5 0" width="7.2" height="0.1" color="#ff0000" material="shader: flat"></a-plane>
          <a-plane position="0 -5 0" width="7.2" height="0.1" color="#ff0000" material="shader: flat"></a-plane>
          <a-plane position="-3.5 0 0" width="0.1" height="10" color="#ff0000" material="shader: flat"></a-plane>
          <a-plane position="3.5 0 0" width="0.1" height="10" color="#ff0000" material="shader: flat"></a-plane>


          <a-plane position="-6.5 0 0.1" width="4" height="3" color="#1e293b" opacity="0.95">
            <a-plane position="0 0 -0.01" width="4.1" height="3.1" color="#0ea5e9" opacity="0.5"></a-plane>
            
            <a-text value="GRUPPO POMPE" position="0 1.1 0.05" align="center" color="#0ea5e9" wrapCount="20" width="3.6"></a-text>
            <a-text value="Portata: 120 m3/h\nPrevalenza: 2.5 bar\nAssorbimento: 4.2 kW\n\nStato: INVERTER 80%" 
                    position="0 -0.2 0.05" align="center" color="#f8fafc" wrapCount="25" width="3.6" lineHeight="60"></a-text>
          </a-plane>


          <a-plane position="0 7.5 0.1" width="4" height="3" color="#1e293b" opacity="0.95">
            <a-plane position="0 0 -0.01" width="4.1" height="3.1" color="#f97316" opacity="0.5"></a-plane>
            
            <a-text value="UTA-01 PRINCIPALE" position="0 1.1 0.05" align="center" color="#f97316" wrapCount="20" width="3.6"></a-text>
            <a-text value="Temp. Mandata: 65.2 C\nTemp. Ritorno: 54.1 C\nPotenza Termica: 145 kW\n\nSetpoint: RAGGIUNTO" 
                    position="0 -0.2 0.05" align="center" color="#f8fafc" wrapCount="25" width="3.6" lineHeight="60"></a-text>
          </a-plane>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
