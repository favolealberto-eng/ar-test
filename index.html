<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - Tracciamento Marker</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      
      <a-marker preset="hiro" 
          smooth="true" 
          smoothCount="10" 
          smoothTolerance="0.01" 
          smoothThreshold="5">
        
        <a-plane position="0 0.5 0" rotation="-90 0 0" width="1.5" height="1" color="#121212" opacity="0.9">
          <a-text value="IMPIANTO: UTA-01\n\nTemperatura: 22.4 C\nFlusso: Nominale\nStato: ATTIVO" 
                  align="center" color="#00FF00" width="3" position="0 0 0.05">
          </a-text>
        </a-plane>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
