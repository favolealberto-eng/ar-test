<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script>
      AFRAME.registerComponent('posiziona-pannello', {
        init: function () {
          // 'this.el' è l'elemento HTML a cui attaccheremo questo script (il nostro mirino)
          const mirino = this.el;
          const contenitore = document.querySelector('#contenitore');

          // Aspettiamo che l'utente entri in modalità Realtà Aumentata (AR)
          this.el.sceneEl.addEventListener('enter-vr', () => {
            const scena = this.el.sceneEl;
            
            // Controlliamo di essere effettivamente in AR
            if (scena.is('ar-mode')) {
              // Otteniamo la sessione WebXR del browser
              const sessioneXR = scena.renderer.xr.getSession();
              
              // Ascoltiamo l'evento 'select', che viene attivato con un tap sullo schermo
              sessioneXR.addEventListener('select', () => {
                
                // Se il mirino è nascosto (nessuna superficie trovata), fermiamo tutto
                if (!mirino.object3D.visible) return;

                // 1. Prendiamo la posizione esatta del mirino in quel momento
                const posizione = mirino.object3D.position;

                // 2. Creiamo il nuovo pannello in memoria
                const nuovoPannello = document.createElement('a-entity');
                nuovoPannello.setAttribute('mixin', 'pannello');
                
                // 3. Lo alziamo di 20 cm rispetto alla superficie trovata
                nuovoPannello.setAttribute('position', {
                  x: posizione.x, 
                  y: posizione.y + 0.2, 
                  z: posizione.z
                });
                
                // 4. Lo ruotiamo leggermente verso l'alto
                nuovoPannello.setAttribute('rotation', '-10 0 0');
                
                // 5. Lo "attacchiamo" al contenitore per farlo apparire nel mondo 3D
                contenitore.appendChild(nuovoPannello);
              });
            }
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene webxr="optionalFeatures: hit-test, anchors;">
      
      <a-assets>
        <a-mixin id="pannello" 
                 geometry="primitive: plane; width: 0.8; height: 0.5" 
                 material="color: #121212; opacity: 0.9; side: double"
                 text="align: center; width: 2; color: #00FF00; 
                       value: MONITORAGGIO EURIX\nTemp: 22.5 C\nStatus: ONLINE">
        </a-mixin>
      </a-assets>

      <a-entity id="mirino" ar-hit-test="target: #contenitore" posiziona-pannello>
        <a-ring color="cyan" rotation="-90 0 0" radius-inner="0.08" radius-outer="0.1"></a-ring>
      </a-entity>

      <a-entity id="contenitore"></a-entity>
      <a-camera position="0 0 0"></a-camera>
    </a-scene>
  </body>
</html>
