<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - Mappa Spaziale Assoluta</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      
      <a-marker preset="hiro" 
                smooth="true" 
                smoothCount="30" 
                smoothTolerance="0.05" 
                smoothThreshold="10">
        
        <a-entity rotation="-90 0 0">
          
          <a-sphere position="0 0 0" radius="0.1" color="#00ff00" opacity="0.8"></a-sphere>

          <a-plane position="-4 0 0.2" width="1.5" height="1" color="#0055ff" opacity="0.9">
            <a-text value="PANNELLO SX\n(-40 cm)" align="center" width="4" position="0 0 0.05"></a-text>
          </a-plane>

          <a-plane position="0 3 0.2" width="1.5" height="1" color="#ff5500" opacity="0.9">
            <a-text value="PANNELLO UP\n(+30 cm)" align="center" width="4" position="0 0 0.05"></a-text>
          </a-plane>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
