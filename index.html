<!DOCTYPE html>
<html>
  <head>

    <title>EURIX - AR Dashboard Responsive</title>

    <style>
      /* UI ancorata in basso a sinistra, impilata in verticale (Perfetta per Portrait/Landscape) */
      #ui-container {
        display: none; 
        position: fixed; 
        bottom: 30px; 
        left: 20px; /* Fissato a sinistra, indipendente dalla larghezza dello schermo */
        flex-direction: column; /* Impila i bottoni dall'alto verso il basso */
        align-items: flex-start; /* Allinea a sinistra */
        gap: 12px; /* Spazio tra un bottone e l'altro */
        z-index: 99999; 
        pointer-events: none; 
      }
      .btn {
        background: #0ea5e9; color: white; border: none; padding: 14px 20px;
        border-radius: 8px; font-weight: bold; font-family: sans-serif;
        box-shadow: 0 4px 6px rgba(0,0,0,0.5); cursor: pointer;
        pointer-events: auto; 
        width: 180px; /* Larghezza fissa per dare un aspetto ordinato a colonna */
        text-align: center; /* Centra il testo nel bottone */
        font-size: 14px;
      }
      .btn-freeze { background: #f97316; }
      
      #hud-modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

      }

      }
